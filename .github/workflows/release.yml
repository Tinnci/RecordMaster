name: Android Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "RELEASE_KEYSTORE_BASE64 is not configured"
            exit 1
          fi

          mkdir -p "$RUNNER_TEMP/signing"
          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/signing/release.jks"
          echo "RELEASE_STORE_FILE=$RUNNER_TEMP/signing/release.jks" >> "$GITHUB_ENV"

      - name: Derive release version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION_NAME="${GITHUB_REF_NAME#v}"

          if [[ ! "$VERSION_NAME" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag '$GITHUB_REF_NAME' is not a supported semantic version (expected vMAJOR.MINOR.PATCH)"
            exit 1
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION_NAME"
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))

          echo "RELEASE_VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"

      - name: Build release APK
        env:
          CI: "true"
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          RELEASE_VERSION_NAME: ${{ env.RELEASE_VERSION_NAME }}
          RELEASE_VERSION_CODE: ${{ env.RELEASE_VERSION_CODE }}
        run: ./gradlew assembleRelease

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ github.ref_name }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 14

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes ""
          gh release upload "$GITHUB_REF_NAME" app/build/outputs/apk/release/*.apk --clobber