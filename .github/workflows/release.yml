name: Android Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "RELEASE_KEYSTORE_BASE64 is not configured"
            exit 1
          fi

          mkdir -p "$RUNNER_TEMP/signing"
          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/signing/release.jks"
          echo "RELEASE_STORE_FILE=$RUNNER_TEMP/signing/release.jks" >> "$GITHUB_ENV"

      - name: Derive release version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION_NAME="${GITHUB_REF_NAME#v}"

          if [[ ! "$VERSION_NAME" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)(-((alpha|beta|rc))\.([0-9]+))?$ ]]; then
            echo "Tag '$GITHUB_REF_NAME' is not a supported semantic version (expected vMAJOR.MINOR.PATCH or vMAJOR.MINOR.PATCH-beta.1)"
            exit 1
          fi

          MAJOR="${BASH_REMATCH[1]}"
          MINOR="${BASH_REMATCH[2]}"
          PATCH="${BASH_REMATCH[3]}"
          PRE_TYPE="${BASH_REMATCH[5]:-stable}"
          PRE_NUMBER="${BASH_REMATCH[7]:-0}"
          BASE_CODE=$((MAJOR * 1000000 + MINOR * 10000 + PATCH * 100))

          case "$PRE_TYPE" in
            alpha)
              if (( PRE_NUMBER < 1 || PRE_NUMBER > 29 )); then
                echo "alpha prerelease number must be between 1 and 29"
                exit 1
              fi
              OFFSET=$PRE_NUMBER
              RELEASE_PRERELEASE=true
              ;;
            beta)
              if (( PRE_NUMBER < 1 || PRE_NUMBER > 29 )); then
                echo "beta prerelease number must be between 1 and 29"
                exit 1
              fi
              OFFSET=$((30 + PRE_NUMBER))
              RELEASE_PRERELEASE=true
              ;;
            rc)
              if (( PRE_NUMBER < 1 || PRE_NUMBER > 29 )); then
                echo "rc prerelease number must be between 1 and 29"
                exit 1
              fi
              OFFSET=$((60 + PRE_NUMBER))
              RELEASE_PRERELEASE=true
              ;;
            stable)
              OFFSET=99
              RELEASE_PRERELEASE=false
              ;;
            *)
              echo "Unsupported prerelease channel '$PRE_TYPE'"
              exit 1
              ;;
          esac

          VERSION_CODE=$((BASE_CODE + OFFSET))

          echo "RELEASE_VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"
          echo "RELEASE_PRERELEASE=$RELEASE_PRERELEASE" >> "$GITHUB_ENV"

      - name: Build release APK
        env:
          CI: "true"
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          RELEASE_VERSION_NAME: ${{ env.RELEASE_VERSION_NAME }}
          RELEASE_VERSION_CODE: ${{ env.RELEASE_VERSION_CODE }}
        run: ./gradlew assembleRelease

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ github.ref_name }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 14

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_PRERELEASE: ${{ env.RELEASE_PRERELEASE }}
        run: |
          if ! gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            if [[ "$RELEASE_PRERELEASE" == "true" ]]; then
              gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes "" --prerelease
            else
              gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes ""
            fi
          fi

          gh release upload "$GITHUB_REF_NAME" app/build/outputs/apk/release/*.apk --clobber